<div class="auth-wrapper">
  <div class="auth-container glass-panel animate-fade-in">
    <div class="auth-header">
      <mat-icon class="logo">person_add</mat-icon>
      <h2 class="text-gradient">Create Account</h2>
      <p>Join the Lumina Library ecosystem</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Full Name</mat-label>
        <input matInput formControlName="fullName" placeholder="John Doe">
        <mat-icon matSuffix>badge</mat-icon>
        <mat-error *ngIf="registerForm.get('fullName')?.hasError('required')">Name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Email Address</mat-label>
        <input matInput formControlName="email" type="email" placeholder="john@example.com">
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Invalid email format</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
        <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
          <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Must be at least 6 characters</mat-error>
      </mat-form-field>

      <button mat-flat-button class="btn-primary w-100 mt-3" type="submit" [disabled]="registerForm.invalid || isLoading">
        <span *ngIf="!isLoading">Register</span>
        <mat-spinner diameter="24" *ngIf="isLoading" style="margin: 0 auto;"></mat-spinner>
      </button>

      <div class="auth-footer mt-4">
        Already have an account? <a routerLink="/auth/login" class="text-gradient font-medium">Log in here</a>
      </div>
    </form>
  </div>
</div>
