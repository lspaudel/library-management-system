<div class="auth-wrapper">
  <div class="auth-container glass-panel animate-fade-in">
    <div class="auth-header">
      <mat-icon class="logo">auto_stories</mat-icon>
      <h2 class="text-gradient">Welcome Back</h2>
      <p>Log in to access your library</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Email Address</mat-label>
        <input matInput formControlName="email" type="email" placeholder="john@example.com">
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Invalid email format</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
        <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
          <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
      </mat-form-field>

      <button mat-flat-button class="btn-primary w-100 mt-3" type="submit" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Log In</span>
        <mat-spinner diameter="24" *ngIf="isLoading" style="margin: 0 auto;"></mat-spinner>
      </button>

      <div class="auth-footer mt-4">
        Don't have an account? <a routerLink="/auth/register" class="text-gradient font-medium">Register here</a>
      </div>
    </form>
  </div>
</div>
