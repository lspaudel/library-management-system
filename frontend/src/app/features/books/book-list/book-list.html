<div class="header-actions">
  <h1 class="page-title text-gradient">Library Collection</h1>
  <button mat-flat-button class="btn-primary" *ngIf="isAdmin" routerLink="/books/new">
    <mat-icon>add</mat-icon> Add Book
  </button>
</div>

<div class="search-bar glass-panel mt-4">
  <mat-form-field appearance="outline" class="w-100 search-field">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput [formControl]="searchControl" placeholder="Search by title, author, or ISBN...">
  </mat-form-field>
</div>

<div class="loading-shade" *ngIf="isLoading()">
  <mat-spinner></mat-spinner>
</div>

<div class="book-grid mt-4" *ngIf="!isLoading()">
  <mat-card class="book-card" *ngFor="let book of books()">
    <img mat-card-image [src]="book.imageUrl || 'https://via.placeholder.com/200x300?text=No+Cover'" alt="Book cover">
    <mat-card-content>
      <div class="category-badge">{{ book.category?.name }}</div>
      <h3 class="book-title">{{ book.title }}</h3>
      <p class="book-author">{{ book.author?.name }}</p>
      <p class="availability text-muted mt-2">
        <mat-icon [class.text-success]="book.availableQty > 0" [class.text-danger]="book.availableQty === 0" style="font-size: 16px; width: 16px; height: 16px; vertical-align: middle;">
          {{ book.availableQty > 0 ? 'check_circle' : 'cancel' }}
        </mat-icon>
        {{ book.availableQty }} / {{ book.quantity }} available
      </p>
    </mat-card-content>
    <mat-card-actions class="card-actions">
      <button mat-button color="primary" [routerLink]="['/books', book.id]">View Details</button>
    </mat-card-actions>
  </mat-card>

  <div class="empty-state" *ngIf="books().length === 0">
    <mat-icon>menu_book</mat-icon>
    <h3>No books found</h3>
    <p class="text-muted">Try adjusting your search criteria</p>
  </div>
</div>

<mat-paginator 
  class="mt-4 glass-panel"
  style="border-radius: 12px; overflow: hidden;"
  [length]="totalElements()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[10, 25, 50]"
  (page)="onPageChange($event)">
</mat-paginator>
